name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verificar hero MP4
        run: test -f public/hero-pantalla-inicial.mp4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verificar dist (bundle Vite)
        run: |
          test -f dist/index.html
          test -d dist/assets
          ! grep -q 'src/main.tsx' dist/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
